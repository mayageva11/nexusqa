<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminary Analytics</title>
  <style>
    body { margin: 0; background: #050810; color: #e8eaf0; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
  </style>
</head>
<body>
  <p>Redirecting...</p>
  <script>
    const token = localStorage.getItem('luminary_token');
    const _demo = !['localhost', '127.0.0.1', ''].includes(location.hostname);
    if (token) {
      window.location.replace(_demo ? 'dashboard.html' : '/dashboard');
    } else {
      window.location.replace(_demo ? 'login.html' : '/login');
    }
  </script>
</body>
</html>
