<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Luminary Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050810; --surface: #0d1220; --border: #1a2540; --cyan: #00ffd1; --purple: #bf5af2; --pink: #ff2d55; --text: #e8eaf0; --muted: #5a6480; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; }
    .sidebar-logo { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--cyan); padding: 0 1.5rem 1.5rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
    .sidebar-nav { padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s, background 0.2s; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--cyan); background: rgba(0,255,209,0.08); border-left: 2px solid var(--cyan); }
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .header-title { font-size: 1.125rem; font-weight: 600; }
    .content { padding: 2rem; flex: 1; }
    .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 0.625rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    .search-input:focus { outline: none; border-color: var(--cyan); }
    .filter-select { padding: 0.625rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; cursor: pointer; }
    .btn-add { padding: 0.625rem 1.25rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: box-shadow 0.2s; white-space: nowrap; }
    .btn-add:hover { box-shadow: 0 0 20px rgba(0,255,209,0.4); }
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    th:hover { color: var(--text); }
    th.sorted { color: var(--cyan); }
    td { padding: 0.875rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-flex; align-items: center; padding: 0.2em 0.6em; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
    .badge-admin { background: rgba(191,90,242,0.15); color: var(--purple); }
    .badge-editor { background: rgba(0,255,209,0.12); color: var(--cyan); }
    .badge-viewer { background: rgba(90,100,128,0.2); color: var(--muted); }
    .badge-active { background: rgba(0,255,209,0.12); color: var(--cyan); }
    .badge-inactive { background: rgba(255,45,85,0.12); color: var(--pink); }
    .actions-cell { display: flex; gap: 0.5rem; }
    .btn-icon { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.25rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: inherit; transition: all 0.2s; }
    .btn-icon:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn-icon.danger:hover { border-color: var(--pink); color: var(--pink); }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1.25rem; }
    .page-btn { width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-family: inherit; transition: all 0.2s; }
    .page-btn:hover, .page-btn.active { border-color: var(--cyan); color: var(--cyan); }
    .page-info { color: var(--muted); font-size: 0.875rem; margin: 0 0.5rem; }
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(5,8,16,0.8); z-index: 50; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 480px; }
    .modal-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input { width: 100%; padding: 0.625rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--cyan); }
    .form-input.error { border-color: var(--pink); }
    .field-error { color: var(--pink); font-size: 0.8125rem; margin-top: 0.25rem; display: none; }
    .field-error.visible { display: block; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-cancel { padding: 0.625rem 1.25rem; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-submit { padding: 0.625rem 1.25rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; transition: box-shadow 0.2s; }
    .btn-submit:hover { box-shadow: 0 0 16px rgba(0,255,209,0.4); }
    .confirm-dialog { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 380px; text-align: center; }
    .confirm-dialog p { color: var(--muted); margin: 0.75rem 0 1.5rem; font-size: 0.9rem; }
    .btn-danger { padding: 0.625rem 1.25rem; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.375rem 0.875rem; border-radius: 8px; cursor: pointer; font-size: 0.8125rem; font-family: inherit; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--pink); color: var(--pink); }
  </style>
</head>
<body>
  <nav class="sidebar" data-testid="sidebar">
    <div class="sidebar-logo">Luminary</div>
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-testid="nav-dashboard"><span>⬡</span> Dashboard</a>
      <a href="analytics.html" class="nav-item" data-testid="nav-analytics"><span>◈</span> Analytics</a>
      <a href="users.html" class="nav-item active" data-testid="nav-users"><span>◉</span> Users</a>
      <a href="reports.html" class="nav-item" data-testid="nav-reports"><span>◫</span> Reports</a>
      <a href="#" class="nav-item" data-testid="nav-settings"><span>◎</span> Settings</a>
    </div>
    <a href="/cv" class="nav-item" data-testid="nav-cv" style="margin:0;border-top:1px solid var(--border);border-radius:0;color:var(--cyan);font-size:0.75rem;letter-spacing:0.05em;" target="_blank"><span>◈</span> My Portfolio ↗</a>
  </nav>

  <div class="main">
    <header class="header">
      <div class="header-title" data-testid="page-title">Users</div>
      <button class="logout-btn" data-testid="logout-btn" id="logoutBtn">Sign out</button>
    </header>
    <div class="content">
      <div class="toolbar">
        <input type="search" class="search-input" data-testid="search-input" placeholder="Search by name or email..." id="searchInput">
        <select class="filter-select" data-testid="role-filter" id="roleFilter">
          <option value="">All roles</option>
          <option value="admin">Admin</option>
          <option value="editor">Editor</option>
          <option value="viewer">Viewer</option>
        </select>
        <button class="btn-add" data-testid="add-user-btn" id="addUserBtn">+ Add User</button>
      </div>

      <div class="table-card">
        <table data-testid="users-table">
          <thead>
            <tr>
              <th data-testid="sort-name" data-col="name">Name ↕</th>
              <th data-testid="sort-email" data-col="email">Email ↕</th>
              <th data-testid="sort-role" data-col="role">Role ↕</th>
              <th>Status</th>
              <th>Last Login</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody" data-testid="users-table-body"></tbody>
        </table>
        <div class="pagination" data-testid="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Add/Edit User Modal -->
  <div class="modal-backdrop" data-testid="user-modal" id="userModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add User</div>
      <form id="userForm" novalidate>
        <input type="hidden" id="editUserId">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-input" data-testid="user-name-input" id="userNameInput" placeholder="Jane Smith">
          <div class="field-error" data-testid="name-error" id="nameError">Name is required</div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-input" data-testid="user-email-input" id="userEmailInput" placeholder="jane@example.com">
          <div class="field-error" data-testid="email-error" id="emailError">Valid email is required</div>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select class="form-input" data-testid="user-role-select" id="userRoleSelect">
            <option value="">Select role</option>
            <option value="admin">Admin</option>
            <option value="editor">Editor</option>
            <option value="viewer">Viewer</option>
          </select>
          <div class="field-error" data-testid="role-error" id="roleError">Role is required</div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" data-testid="modal-cancel" id="modalCancel">Cancel</button>
          <button type="submit" class="btn-submit" data-testid="modal-submit">Save User</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Dialog -->
  <div class="modal-backdrop" data-testid="delete-dialog" id="deleteDialog">
    <div class="confirm-dialog">
      <div style="font-size:1.125rem;font-weight:600">Delete User</div>
      <p data-testid="delete-confirm-text">Are you sure you want to delete this user? This action cannot be undone.</p>
      <div style="display:flex;gap:0.75rem;justify-content:center">
        <button class="btn-cancel" data-testid="delete-cancel" id="deleteCancel">Cancel</button>
        <button class="btn-danger" data-testid="delete-confirm" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    /* Demo mode — active only on GitHub Pages; provides mock API responses without a server */
    (function () {
      if (['localhost', '127.0.0.1', ''].includes(location.hostname)) return;
      window._demo = true;
      var _users = [
        {id:'1',name:'Aria Chen',email:'aria.chen@luminary.io',role:'admin',status:'active',lastLogin:'2026-06-15T09:23:11Z'},
        {id:'2',name:'Marcus Webb',email:'marcus.webb@luminary.io',role:'editor',status:'active',lastLogin:'2026-06-16T08:45:30Z'},
        {id:'3',name:'Sofia Patel',email:'viewer@luminary.io',role:'viewer',status:'active',lastLogin:'2026-06-14T14:12:05Z'},
        {id:'4',name:'James Okafor',email:'j.okafor@luminary.io',role:'editor',status:'active',lastLogin:'2026-06-17T07:30:00Z'},
        {id:'5',name:'Lena Hoffmann',email:'l.hoffmann@luminary.io',role:'viewer',status:'inactive',lastLogin:'2026-06-01T11:20:45Z'},
        {id:'6',name:'Noah Torres',email:'n.torres@luminary.io',role:'viewer',status:'active',lastLogin:'2026-06-16T16:55:22Z'},
        {id:'7',name:'Yuki Tanaka',email:'y.tanaka@luminary.io',role:'editor',status:'active',lastLogin:'2026-06-17T06:18:33Z'},
        {id:'8',name:'Camille Rousseau',email:'c.rousseau@luminary.io',role:'admin',status:'active',lastLogin:'2026-06-15T13:44:50Z'},
        {id:'9',name:'Raj Mehta',email:'r.mehta@luminary.io',role:'viewer',status:'active',lastLogin:'2026-06-12T09:05:11Z'},
        {id:'10',name:'Elena Vasquez',email:'e.vasquez@luminary.io',role:'editor',status:'active',lastLogin:'2026-06-17T10:02:44Z'},
        {id:'11',name:'Tom Fischer',email:'t.fischer@luminary.io',role:'viewer',status:'inactive',lastLogin:'2026-05-28T15:30:00Z'},
        {id:'12',name:'Amara Diallo',email:'a.diallo@luminary.io',role:'viewer',status:'active',lastLogin:'2026-06-16T12:15:38Z'},
      ];
      var _nextId = 100;
      function _ok(data, status) { return Promise.resolve(new Response(JSON.stringify(data), {status: status || 200, headers: {'Content-Type': 'application/json'}})); }
      var _origFetch = window.fetch.bind(window);
      window.fetch = function (input, opts) {
        var url = typeof input === 'string' ? input : input.url;
        if (!url.includes('/api/')) return _origFetch(input, opts);
        var path = url.replace(/^https?:\/\/[^/]+/, '').replace(/\?.*/, '');
        var method = ((opts && opts.method) || 'GET').toUpperCase();
        var body = {}; try { if (opts && opts.body) body = JSON.parse(opts.body); } catch (e) {}
        if (path === '/api/auth/logout') return _ok({message: 'ok'});
        if (path.startsWith('/api/users')) {
          var idM = path.match(/\/api\/users\/(.+)/);
          if (idM) {
            var uid = idM[1];
            if (method === 'GET') { var fu = _users.find(function(x){return x.id === uid;}); return _ok(fu || {}, fu ? 200 : 404); }
            if (method === 'DELETE') { _users = _users.filter(function(x){return x.id !== uid;}); return _ok({message: 'deleted'}); }
            if (method === 'PUT' || method === 'PATCH') { var xi = _users.findIndex(function(x){return x.id === uid;}); if (xi >= 0) _users[xi] = Object.assign({}, _users[xi], body); return _ok(_users[xi] || {}); }
          }
          if (method === 'POST') { var nu = Object.assign({id: String(_nextId++), avatar: (body.name || '?').slice(0,2).toUpperCase(), status: 'active', lastLogin: new Date().toISOString()}, body); _users.push(nu); return _ok(nu, 201); }
          var uo = new URL(url, 'https://x.x'); var q = uo.searchParams.get('search') || '', rl = uo.searchParams.get('role') || '';
          var pg = parseInt(uo.searchParams.get('page') || '1'); var lim = parseInt(uo.searchParams.get('limit') || '10');
          var fil = _users.filter(function(x){return (!q || x.name.toLowerCase().includes(q.toLowerCase()) || x.email.toLowerCase().includes(q.toLowerCase())) && (!rl || x.role === rl);});
          var pages = Math.ceil(fil.length / lim) || 1;
          return _ok({users: fil.slice((pg-1)*lim, pg*lim), pagination: {page: pg, pages: pages, total: fil.length, limit: lim}});
        }
        return _ok({error: 'not found'}, 404);
      };
      document.addEventListener('DOMContentLoaded', function() { var cv = document.querySelector('[data-testid="nav-cv"]'); if (cv) cv.href = 'https://mayageva11.github.io/nexusqa'; });
    })();
    const token = localStorage.getItem('luminary_token');
    if (!token) { window.location.replace(window._demo ? 'login.html' : '/login'); }

    let currentPage = 1;
    let currentSort = '';
    let currentOrder = 'asc';
    let deleteTargetId = null;

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      localStorage.clear();
      window.location.replace(window._demo ? 'login.html' : '/login');
    });

    async function loadUsers() {
      const search = document.getElementById('searchInput').value;
      const role = document.getElementById('roleFilter').value;
      const params = new URLSearchParams({ page: currentPage, limit: 10 });
      if (search) params.set('search', search);
      if (role) params.set('role', role);
      if (currentSort) { params.set('sort', currentSort); params.set('order', currentOrder); }

      const res = await fetch(`/api/users?${params}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { localStorage.removeItem('luminary_token'); localStorage.removeItem('luminary_user'); window.location.replace(window._demo ? 'login.html' : '/login'); return; }
      const data = await res.json();
      renderTable(data.users);
      renderPagination(data.pagination);
    }

    function roleClass(role) { return `badge badge-${role}`; }
    function statusClass(status) { return `badge badge-${status}`; }

    function renderTable(users) {
      const tbody = document.getElementById('usersTableBody');
      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">No users found</td></tr>`;
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr data-testid="user-row" data-user-id="${u.id}">
          <td data-testid="user-name">${escHtml(u.name)}</td>
          <td data-testid="user-email">${escHtml(u.email)}</td>
          <td><span class="${roleClass(u.role)}" data-testid="user-role">${u.role}</span></td>
          <td><span class="${statusClass(u.status)}" data-testid="user-status">${u.status}</span></td>
          <td data-testid="user-last-login">${new Date(u.lastLogin).toLocaleDateString()}</td>
          <td>
            <div class="actions-cell">
              <button class="btn-icon" data-testid="edit-user-btn" onclick="openEditModal('${u.id}')">Edit</button>
              <button class="btn-icon danger" data-testid="delete-user-btn" onclick="openDeleteDialog('${u.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination({ page, pages, total }) {
      const el = document.getElementById('pagination');
      const btns = [];
      for (let i = 1; i <= pages; i++) {
        btns.push(`<button class="page-btn${i === page ? ' active' : ''}" data-testid="page-btn-${i}" onclick="goPage(${i})">${i}</button>`);
      }
      el.innerHTML = `<span class="page-info" data-testid="pagination-info">Showing page ${page} of ${pages} (${total} total)</span>${btns.join('')}`;
    }

    function goPage(p) { currentPage = p; loadUsers(); }

    document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; loadUsers(); });
    document.getElementById('roleFilter').addEventListener('change', () => { currentPage = 1; loadUsers(); });

    document.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (currentSort === col) { currentOrder = currentOrder === 'asc' ? 'desc' : 'asc'; }
        else { currentSort = col; currentOrder = 'asc'; }
        document.querySelectorAll('th[data-col]').forEach(t => t.classList.remove('sorted'));
        th.classList.add('sorted');
        loadUsers();
      });
    });

    // Modal
    document.getElementById('addUserBtn').addEventListener('click', () => openAddModal());
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('userModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add User';
      document.getElementById('editUserId').value = '';
      document.getElementById('userForm').reset();
      clearFormErrors();
      document.getElementById('userModal').classList.add('open');
    }

    async function openEditModal(id) {
      const res = await fetch(`/api/users/${id}`, { headers: { Authorization: `Bearer ${token}` } });
      const user = await res.json();
      document.getElementById('modalTitle').textContent = 'Edit User';
      document.getElementById('editUserId').value = id;
      document.getElementById('userNameInput').value = user.name;
      document.getElementById('userEmailInput').value = user.email;
      document.getElementById('userRoleSelect').value = user.role;
      clearFormErrors();
      document.getElementById('userModal').classList.add('open');
    }

    function closeModal() { document.getElementById('userModal').classList.remove('open'); }

    function clearFormErrors() {
      ['nameError','emailError','roleError'].forEach(id => document.getElementById(id).classList.remove('visible'));
      ['userNameInput','userEmailInput','userRoleSelect'].forEach(id => document.getElementById(id).classList.remove('error'));
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFormErrors();
      const name = document.getElementById('userNameInput').value.trim();
      const email = document.getElementById('userEmailInput').value.trim();
      const role = document.getElementById('userRoleSelect').value;
      let valid = true;
      if (!name) { document.getElementById('nameError').classList.add('visible'); document.getElementById('userNameInput').classList.add('error'); valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailError').classList.add('visible'); document.getElementById('userEmailInput').classList.add('error'); valid = false; }
      if (!role) { document.getElementById('roleError').classList.add('visible'); document.getElementById('userRoleSelect').classList.add('error'); valid = false; }
      if (!valid) return;

      const editId = document.getElementById('editUserId').value;
      const method = editId ? 'PUT' : 'POST';
      const url = editId ? `/api/users/${editId}` : '/api/users';
      const res = await fetch(url, { method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, role }) });
      if (res.ok) { closeModal(); loadUsers(); }
      else { const d = await res.json(); alert(d.error ?? 'Failed to save user'); }
    });

    // Delete dialog
    function openDeleteDialog(id) {
      deleteTargetId = id;
      document.getElementById('deleteDialog').classList.add('open');
    }

    document.getElementById('deleteCancel').addEventListener('click', () => {
      deleteTargetId = null;
      document.getElementById('deleteDialog').classList.remove('open');
    });

    document.getElementById('deleteConfirm').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      await fetch(`/api/users/${deleteTargetId}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      deleteTargetId = null;
      document.getElementById('deleteDialog').classList.remove('open');
      loadUsers();
    });

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    loadUsers();
  </script>
</body>
</html>
