<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Luminary Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050810; --surface: #0d1220; --border: #1a2540; --cyan: #00ffd1; --purple: #bf5af2; --pink: #ff2d55; --text: #e8eaf0; --muted: #5a6480; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; }
    .sidebar-logo { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--cyan); padding: 0 1.5rem 1.5rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
    .sidebar-nav { padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s, background 0.2s; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--cyan); background: rgba(0,255,209,0.08); border-left: 2px solid var(--cyan); }
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .header-title { font-size: 1.125rem; font-weight: 600; }
    .content { padding: 2rem; flex: 1; }
    .page-heading { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
    .date-range-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .range-btn { padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 0.875rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .range-btn:hover { border-color: var(--cyan); color: var(--text); }
    .range-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,255,209,0.08); }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .chart-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
    .chart-wrapper { position: relative; height: 280px; }
    .data-table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .data-table-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.625rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.75rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.375rem 0.875rem; border-radius: 8px; cursor: pointer; font-size: 0.8125rem; font-family: inherit; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--pink); color: var(--pink); }
    @media (max-width: 768px) {
      .sidebar { width: 56px; overflow: hidden; }
      .sidebar-logo { display: none; }
      .nav-item { padding: 0.875rem 0; justify-content: center; gap: 0; font-size: 0; }
      .nav-icon { font-size: 1.1rem; }
      .main { margin-left: 56px; min-width: 0; }
      .content { padding: 1rem; }
      .header { padding: 0.75rem 1rem; }
      .charts-grid { grid-template-columns: 1fr; }
      .data-table-card { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <nav class="sidebar" data-testid="sidebar">
    <div class="sidebar-logo">Luminary</div>
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-testid="nav-dashboard"><span>⬡</span> Dashboard</a>
      <a href="analytics.html" class="nav-item active" data-testid="nav-analytics"><span>◈</span> Analytics</a>
      <a href="users.html" class="nav-item" data-testid="nav-users"><span>◉</span> Users</a>
      <a href="reports.html" class="nav-item" data-testid="nav-reports"><span>◫</span> Reports</a>
      <a href="#" class="nav-item" data-testid="nav-settings"><span>◎</span> Settings</a>
    </div>
    <a href="/cv" class="nav-item" data-testid="nav-cv" style="margin:0;border-top:1px solid var(--border);border-radius:0;color:var(--cyan);font-size:0.75rem;letter-spacing:0.05em;" target="_blank"><span>◈</span> My Portfolio ↗</a>
  </nav>

  <div class="main">
    <header class="header">
      <div class="header-title" data-testid="page-title">Analytics</div>
      <button class="logout-btn" data-testid="logout-btn" id="logoutBtn">Sign out</button>
    </header>
    <div class="content">
      <h1 class="page-heading">Analytics</h1>
      <div class="date-range-bar" data-testid="date-range-bar">
        <button class="range-btn active" data-testid="range-7d" data-range="7">Last 7 days</button>
        <button class="range-btn" data-testid="range-30d" data-range="30">Last 30 days</button>
        <button class="range-btn" data-testid="range-90d" data-range="90">Last 90 days</button>
      </div>
      <div class="charts-grid">
        <div class="chart-card">
          <h2>Sessions per Day</h2>
          <div class="chart-wrapper"><canvas id="sessionsChart" data-testid="sessions-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <h2>Traffic Sources</h2>
          <div class="chart-wrapper"><canvas id="sourcesChart" data-testid="sources-chart"></canvas></div>
        </div>
      </div>
      <div class="data-table-card">
        <h2>Top Pages</h2>
        <table data-testid="top-pages-table">
          <thead>
            <tr>
              <th>Page</th>
              <th>Sessions</th>
              <th>Bounce Rate</th>
              <th>Avg Time on Page</th>
            </tr>
          </thead>
          <tbody id="pagesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    /* Demo mode — active only on GitHub Pages; provides mock API responses without a server */
    (function () {
      if (['localhost', '127.0.0.1', ''].includes(location.hostname)) return;
      window._demo = true;
      var _s = []; for (var _i = 0; _i < 30; _i++) { var _d = new Date('2026-05-19'); _d.setDate(_d.getDate() + _i); _s.push({date: _d.toISOString().slice(0,10), sessions: Math.floor(220 + Math.sin(_i) * 80 + Math.random() * 60)}); }
      var _metrics = {
        cards: [{id:'revenue',value:'$142,382',trend:'up',change:12.3},{id:'active-users',value:'8,249',trend:'up',change:5.7},{id:'conversion-rate',value:'3.24%',trend:'down',change:0.8},{id:'avg-session',value:'4m 32s',trend:'up',change:11.2}],
        series: _s,
        trafficSources: [{label:'Organic',value:45},{label:'Direct',value:28},{label:'Referral',value:15},{label:'Social',value:8},{label:'Email',value:4}],
        topPages: [{path:'/dashboard',sessions:3842,bounceRate:24.3,avgTime:'3m 45s'},{path:'/analytics',sessions:2156,bounceRate:31.8,avgTime:'4m 12s'},{path:'/users',sessions:1893,bounceRate:18.5,avgTime:'5m 28s'},{path:'/reports',sessions:1247,bounceRate:22.1,avgTime:'3m 55s'},{path:'/login',sessions:8249,bounceRate:12.4,avgTime:'1m 23s'}],
      };
      function _ok(data, status) { return Promise.resolve(new Response(JSON.stringify(data), {status: status || 200, headers: {'Content-Type': 'application/json'}})); }
      var _origFetch = window.fetch.bind(window);
      window.fetch = function (input, opts) {
        var url = typeof input === 'string' ? input : input.url;
        if (!url.includes('/api/')) return _origFetch(input, opts);
        var path = url.replace(/^https?:\/\/[^/]+/, '').replace(/\?.*/, '');
        if (path === '/api/metrics') return _ok(_metrics);
        return _ok({message: 'ok'});
      };
      document.addEventListener('DOMContentLoaded', function() { var cv = document.querySelector('[data-testid="nav-cv"]'); if (cv) cv.href = 'https://mayageva11.github.io/nexusqa'; });
    })();
    const token = localStorage.getItem('luminary_token');
    if (!token) { window.location.replace(window._demo ? 'login.html' : '/login'); }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      localStorage.clear();
      window.location.replace(window._demo ? 'login.html' : '/login');
    });

    let sessionsChart, sourcesChart;

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadMetrics(parseInt(btn.dataset.range, 10));
      });
    });

    async function loadMetrics(days = 7) {
      const res = await fetch('/api/metrics', { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { localStorage.removeItem('luminary_token'); localStorage.removeItem('luminary_user'); window.location.replace(window._demo ? 'login.html' : '/login'); return; }
      const data = await res.json();
      const slice = data.series.slice(-days);

      if (sessionsChart) sessionsChart.destroy();
      if (sourcesChart) sourcesChart.destroy();

      sessionsChart = new Chart(document.getElementById('sessionsChart'), {
        type: 'bar',
        data: {
          labels: slice.map(d => d.date.slice(5)),
          datasets: [{ label: 'Sessions', data: slice.map(d => d.sessions), backgroundColor: 'rgba(0,255,209,0.6)', borderColor: '#00ffd1', borderWidth: 1 }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#1a2540' }, ticks: { color: '#5a6480' } }, y: { grid: { color: '#1a2540' }, ticks: { color: '#5a6480' } } } },
      });

      sourcesChart = new Chart(document.getElementById('sourcesChart'), {
        type: 'pie',
        data: {
          labels: data.trafficSources.map(s => s.label),
          datasets: [{ data: data.trafficSources.map(s => s.value), backgroundColor: ['#00ffd1','#bf5af2','#ff2d55','#3a7bd5','#f5a623'], borderWidth: 0 }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#5a6480', padding: 12, boxWidth: 12 } } } },
      });

      const tbody = document.getElementById('pagesTableBody');
      tbody.innerHTML = data.topPages.map(p => `
        <tr data-testid="top-page-row">
          <td>${p.path}</td>
          <td>${p.sessions.toLocaleString()}</td>
          <td>${p.bounceRate}%</td>
          <td>${p.avgTime}</td>
        </tr>
      `).join('');
    }

    loadMetrics(7);
  </script>
</body>
</html>
