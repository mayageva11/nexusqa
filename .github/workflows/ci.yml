name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BASE_URL: http://localhost:3001
  CI: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Install test dependencies
        run: npm ci
        working-directory: tests
      - name: Typecheck app
        run: npx tsc --noEmit
        working-directory: app
      - name: Typecheck tests
        run: npx tsc --noEmit
        working-directory: tests
      - name: Lint app
        run: npx eslint 'api/**/*.ts' --max-warnings 0
        working-directory: app
        continue-on-error: true

  start-app:
    name: Start App
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Start app in background
        run: |
          node -r ts-node/register api/server.ts &
          echo $! > /tmp/app.pid
        working-directory: app
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 3
          done
          echo "App failed to start" && exit 1
      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: /tmp/server.log

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: start-app
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Install test dependencies
        run: npm ci
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
        working-directory: tests
      - name: Start app
        run: node -r ts-node/register api/server.ts &
        working-directory: app
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
      - name: Wait for app
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && exit 0
            sleep 3
          done
          exit 1
      - name: Run E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.browser }}
        working-directory: tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: tests/playwright-report/
          retention-days: 7
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: tests/allure-results/
          retention-days: 7
      - name: Upload screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: tests/test-results/
          retention-days: 3

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: start-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: app
      - run: npm ci
        working-directory: tests
      - name: Install Playwright (chromium only for API tests)
        run: npx playwright install chromium --with-deps
        working-directory: tests
      - name: Start app
        run: node -r ts-node/register api/server.ts &
        working-directory: app
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
      - name: Wait for app
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && exit 0
            sleep 3
          done
          exit 1
      - name: Run API tests
        run: npx playwright test tests/api/ --project=chromium
        working-directory: tests
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: tests/playwright-report/
          retention-days: 7
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: tests/allure-results/
          retention-days: 7

  deploy-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: [e2e-tests, api-tests]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-all/
          merge-multiple: false
      - name: Merge Allure results into one folder
        run: |
          mkdir -p allure-results
          find allure-results-all -type f | xargs -I{} cp {} allure-results/ 2>/dev/null || true
          echo "Merged $(ls allure-results | wc -l) result files"
      - name: Fetch previous Allure history from gh-pages
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout origin/gh-pages -- reports/history 2>/dev/null || true
          if [ -d "reports/history" ]; then
            mkdir -p allure-results/history
            cp -r reports/history/. allure-results/history/
            echo "History restored: $(ls allure-results/history | wc -l) files"
          else
            echo "No previous history found — first run"
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Allure CLI
        run: npm install -g allure-commandline
      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report
      - name: Deploy Allure report to GitHub Pages at /reports
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: reports
          keep_files: true
          user_name: 'Maya Erusalimsky'
          user_email: 'mayageva11@gmail.com'
          commit_message: 'deploy: update Allure report [skip ci]'

  report-summary:
    name: PR Comment — Test Results
    runs-on: ubuntu-latest
    needs: [e2e-tests, api-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post test results comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const browserJobs = ['chromium', 'firefox', 'webkit'].map(browser => {
              const job = jobs.jobs.find(j => j.name.includes(`E2E Tests`) && j.name.toLowerCase().includes(browser));
              const icon = !job ? '⏭' : job.conclusion === 'success' ? '✅' : '❌';
              const label = { chromium: '🌐 Chromium', firefox: '🦊 Firefox', webkit: '🧭 WebKit' }[browser];
              return `| ${label} | ${icon} ${job?.conclusion ?? 'skipped'} |`;
            });

            const apiJob = jobs.jobs.find(j => j.name === 'API Tests');
            const apiIcon = !apiJob ? '⏭' : apiJob.conclusion === 'success' ? '✅' : '❌';

            const allPassed = jobs.jobs
              .filter(j => j.name.includes('Tests'))
              .every(j => j.conclusion === 'success');

            const headline = allPassed ? '## ✅ All tests passed' : '## ❌ Some tests failed';
            const reportUrl = 'https://mayageva11.github.io/nexusqa/reports';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              headline,
              '',
              '| Browser / Suite | Result |',
              '|---|---|',
              ...browserJobs,
              `| 🔌 API Tests | ${apiIcon} ${apiJob?.conclusion ?? 'skipped'} |`,
              '',
              `📊 [View Allure Report](${reportUrl}) · 🔍 [View CI Run](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  deploy-portfolio:
    name: Deploy Portfolio to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy portfolio to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./portfolio
          publish_branch: gh-pages
          keep_files: true
          user_name: 'Maya Erusalimsky'
          user_email: 'mayageva11@gmail.com'
          commit_message: 'deploy: update portfolio [skip ci]'
