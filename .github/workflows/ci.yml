name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BASE_URL: http://localhost:3001
  CI: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Install test dependencies
        run: npm ci
        working-directory: tests
      - name: Typecheck app
        run: npx tsc --noEmit
        working-directory: app
      - name: Typecheck tests
        run: npx tsc --noEmit
        working-directory: tests
      - name: Lint app
        run: npx eslint 'api/**/*.ts' --max-warnings 0
        working-directory: app
        continue-on-error: true

  start-app:
    name: Start App
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Start app in background
        run: |
          node -r ts-node/register api/server.ts &
          echo $! > /tmp/app.pid
        working-directory: app
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 3
          done
          echo "App failed to start" && exit 1
      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: /tmp/server.log

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: start-app
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Install test dependencies
        run: npm ci
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
        working-directory: tests
      - name: Start app
        run: node -r ts-node/register api/server.ts &
        working-directory: app
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
      - name: Wait for app
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && exit 0
            sleep 3
          done
          exit 1
      - name: Run E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.browser }}
        working-directory: tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: tests/playwright-report/
          retention-days: 7
      - name: Upload screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: tests/test-results/
          retention-days: 3

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: start-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: app
      - run: npm ci
        working-directory: tests
      - name: Install Playwright (chromium only for API tests)
        run: npx playwright install chromium --with-deps
        working-directory: tests
      - name: Start app
        run: node -r ts-node/register api/server.ts &
        working-directory: app
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
      - name: Wait for app
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && exit 0
            sleep 3
          done
          exit 1
      - name: Run API tests
        run: npx playwright test tests/api/ --project=chromium
        working-directory: tests
      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: tests/playwright-report/
          retention-days: 7

  report-summary:
    name: Report Summary
    runs-on: ubuntu-latest
    needs: [e2e-tests, api-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post test results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const testJobs = jobs.jobs.filter(j => j.name.includes('Tests'));
            const passed = testJobs.filter(j => j.conclusion === 'success').length;
            const failed = testJobs.filter(j => j.conclusion === 'failure').length;
            const skipped = testJobs.filter(j => j.conclusion === 'skipped').length;
            const emoji = failed > 0 ? '❌' : '✅';
            const body = `## ${emoji} NexusQA Test Results\n\n✅ **${passed} passed** | ❌ **${failed} failed** | ⏭️ **${skipped} skipped**\n\n[View full report in Actions](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  deploy-portfolio:
    name: Deploy Portfolio to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy portfolio to gh-pages branch
        run: |
          git config user.email "mayageva11@gmail.com"
          git config user.name "Maya Erusalimsky"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . --quiet 2>/dev/null || true
          cp portfolio/index.html index.html
          git add index.html
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: update portfolio [skip ci]"
          git push origin gh-pages
