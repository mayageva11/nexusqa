name: Nightly Full Regression

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  BASE_URL: http://localhost:3001
  CI: true

jobs:
  full-regression:
    name: Full Suite — ${{ matrix.browser }} — ${{ matrix.viewport }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        viewport: [desktop, tablet, mobile]
        include:
          - viewport: desktop
            width: 1440
            height: 900
          - viewport: tablet
            width: 768
            height: 1024
          - viewport: mobile
            width: 390
            height: 844
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm ci
        working-directory: tests
      - name: Install browser
        run: npx playwright install ${{ matrix.browser }} --with-deps
        working-directory: tests
      - name: Start app
        run: node -r ts-node/register api/server.ts &
        working-directory: app
        env:
          JWT_SECRET: nightly-secret-${{ github.run_id }}
      - name: Wait for app
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && exit 0
            sleep 3
          done
          exit 1
      - name: Run full test suite
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PLAYWRIGHT_VIEWPORT_WIDTH: ${{ matrix.width }}
          PLAYWRIGHT_VIEWPORT_HEIGHT: ${{ matrix.height }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.browser }}-${{ matrix.viewport }}
          path: tests/playwright-report/
          retention-days: 14
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-${{ matrix.browser }}-${{ matrix.viewport }}
          path: tests/allure-results/
          retention-days: 14

  deploy-allure-report:
    name: Deploy Nightly Allure Report with History
    runs-on: ubuntu-latest
    needs: full-regression
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-allure-*
          path: allure-results-all/
          merge-multiple: false
      - name: Merge Allure results into one folder
        run: |
          mkdir -p allure-results
          find allure-results-all -type f | xargs -I{} cp {} allure-results/ 2>/dev/null || true
          echo "Merged $(ls allure-results | wc -l) result files"
      - name: Restore previous Allure history for trend graphs
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout origin/gh-pages -- reports/history 2>/dev/null || true
          if [ -d "reports/history" ]; then
            mkdir -p allure-results/history
            cp -r reports/history/. allure-results/history/
            echo "History restored: $(ls allure-results/history | wc -l) files"
          else
            echo "No previous history — this will be the first data point on trend graphs"
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Allure CLI
        run: npm install -g allure-commandline
      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report
      - name: Deploy Allure report to GitHub Pages at /reports
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: reports
          keep_files: true
          user_name: 'Maya Erusalimsky'
          user_email: 'mayageva11@gmail.com'
          commit_message: 'deploy: nightly Allure report with history [skip ci]'
